<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Detailed Charts Panel Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Dokumentation für das Detailed Charts Panel für Home Assistant">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />

  <style>    
    body, .markdown-section, .sidebar-nav, .app-name { font-family: 'Inter', sans-serif !important; }
    code, pre { font-family: 'Roboto Mono', monospace !important; }
    .sidebar-nav { font-size: 18px !important; }
    .app-name { font-size: 22px !important; }
    .markdown-section p, .markdown-section ul, .markdown-section ol { font-size: 18px !important; line-height: 1.6; }
  </style>
</head>
<body>
  
  <div id="google_translate_element"></div>

  <div id="app">Lade Wiki...</div>

  <script>
    window.$docsify = {
      name: '📉 Detailed Charts Wiki',
      repo: 'jayjojayson/detailed-charts-panel',
      loadSidebar: true,
      loadNavbar: true,
	  relativePath: true,
      subMaxLevel: 3,
      auto2top: true,
      
      darklightTheme: {
        siteFont : "Inter",
        defaultTheme : 'dark',
        codeFontFamily : 'Roboto Mono, monospace',
        bodyFontSize : '19px',
        dark: {
          accent: '#42b983',
          toogleBackground : '#ffffff',
          background: '#091a28',
          textColor: '#b4b4b4',
          codeTextColor : '#ffffff',
          codeBackgroundColor : '#0e2233',
          borderColor : '#0d2538',
          blockQuoteColour : '#858585',
          highlightColor : '#d22778',
          sidebarSublink : '#b4b4b4',
          codeTypeColor : '#ffffff',
          coverBackground : 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage : 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#42b983',
          toogleBackground : '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor : '#525252',
          codeBackgroundColor : '#f8f8f8',
          borderColor : 'rgba(0, 0, 0, 0.07)',
          blockQuoteColour : '#858585',
          highlightColor : '#d22778',
          sidebarSublink : '#505d6b',
          codeTypeColor : '#091a28',
          coverBackground : 'linear-gradient(to left bottom, hsl(118, 100%, 85%) 0%,hsl(181, 100%, 85%) 100%)',
          toogleImage : 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      },
      search: {
        placeholder: 'Search...',
        noData: 'nothing!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Kopieren',
        errorText  : 'Fehler',
        successText: 'Kopiert'
      },
	  // Damit der Titel oben links je nach Sprache korrekt verlinkt
      nameLink: {
        '/en_docs/': '#/en_docs/',
        '/': '#/'
      }
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
</body>
</html>
