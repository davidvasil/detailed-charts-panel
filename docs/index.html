<!-- index.html -->

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Detailed Charts Panel Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Dokumentation für das Detailed Charts Panel für Home Assistant">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<style>
  /* --- SCHRIFTART (GLOBAL) --- */
  body, 
  .markdown-section, 
  .sidebar-nav, 
  .app-name {
      /* Hier 'Inter' eintragen (oder den Namen deiner gewählten Schrift) */
      font-family: 'Inter', sans-serif !important; 
  }
  /* Code-Blöcke bekommen oft eine eigene "Monospace" Schrift */
  code, pre {
      font-family: 'Roboto Mono', 'Monaco', monospace !important;
  }
  /* Optional: Falls dir die Seitenleiste (Links) zu klein ist, 
     kannst du sie hiermit separat vergrößern */
  .sidebar-nav {
      font-size: 18px !important; 
  }  
  /* Optional: Die Überschrift in der Sidebar größer machen */
  .app-name {
      font-size: 22px !important;
  }
  /* Der normale Fließtext */
  .markdown-section p, 
  .markdown-section ul, 
  .markdown-section ol {
      font-size: 20px !important; /* Hier die Wunschgröße eintragen (Standard ist oft 16px) */
      line-height: 1.6;           /* Zeilenabstand etwas erhöhen für bessere Lesbarkeit */
  }
  /* Code-Blöcke (die schwarzen Kästen) */
  .markdown-section pre > code {
      font-size: 16px !important; /* Code sollte oft etwas kleiner sein als Text */
  }
</style>  
  
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '📉 Detailed Charts Panel',
      repo: 'jayjojayson/detailed-charts-panel',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Suche...',
        noData: 'Keine Ergebnisse!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Kopieren',
        errorText  : 'Fehler',
        successText: 'Kopiert'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
